name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  verify:
    name: Build & Type Check & Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check-types
      - run: pnpm build

  notify:
    name: Send Webhook Notification
    runs-on: ubuntu-latest
    needs:
      - verify
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Send CI notification
        if: always()
        env:
          CI_TELEGRAM_BOT_TOKEN: ${{ secrets.CI_TELEGRAM_BOT_TOKEN }}
          CI_TELEGRAM_CHAT_ID: ${{ secrets.CI_TELEGRAM_CHAT_ID }}
          CI_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.workflow }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$CI_TELEGRAM_BOT_TOKEN" ] || [ -z "$CI_TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          JOBS_JSON_PATH="$RUNNER_TEMP/jobs.json"
          JOB_TOTALS_PATH="$RUNNER_TEMP/job-totals.json"
          export JOBS_JSON_PATH JOB_TOTALS_PATH
          node .github/scripts/collect-github-actions-jobs.mjs

          JOBS_JSON="$(cat "$JOBS_JSON_PATH")"
          PASSED="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).success)" "$JOB_TOTALS_PATH")"
          FAILED="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).failed)" "$JOB_TOTALS_PATH")"
          RUNNING="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).running)" "$JOB_TOTALS_PATH")"
          CANCELLED="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).cancelled)" "$JOB_TOTALS_PATH")"

          STATUS="${{ needs.verify.result }}"
          if [ "$STATUS" = "failure" ]; then STATUS="failed"; fi
          if [ "$STATUS" = "skipped" ]; then STATUS="cancelled"; fi

          pnpm notify:telegram \
            --event ci \
            --status "$STATUS" \
            --mode text \
            --project "${{ github.event.repository.name }}" \
            --environment ci \
            --branch "${{ github.ref_name }}" \
            --repository "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --message "$CI_COMMIT_MESSAGE" \
            --author "${{ github.actor }}" \
            --workflow "${{ github.workflow }}" \
            --job "Build & Type Check & Test & Lint" \
            --jobs-json "$JOBS_JSON" \
            --passed "$PASSED" \
            --failed "$FAILED" \
            --running "$RUNNING" \
            --cancelled "$CANCELLED" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
