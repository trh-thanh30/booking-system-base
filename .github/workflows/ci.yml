name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:packages
      - run: pnpm typecheck:packages
      - run: pnpm build:packages

  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:api
      - run: pnpm typecheck:api
      - run: pnpm test:api
      - run: pnpm build:api

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:web
      - run: pnpm typecheck:web
      - run: pnpm build:web

  admin:
    name: Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:admin
      - run: pnpm typecheck:admin
      - run: pnpm build:admin

  notify:
    name: Send Webhook Notification
    runs-on: ubuntu-latest
    needs:
      - packages
      - api
      - web
      - admin
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Send CI notification
        if: always()
        env:
          CI_TELEGRAM_BOT_TOKEN: ${{ secrets.CI_TELEGRAM_BOT_TOKEN }}
          CI_TELEGRAM_CHAT_ID: ${{ secrets.CI_TELEGRAM_CHAT_ID }}
          CI_COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.workflow }}
          CI_NEEDS_JSON: ${{ toJson(needs) }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$CI_TELEGRAM_BOT_TOKEN" ] || [ -z "$CI_TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          JOBS_JSON_PATH="$RUNNER_TEMP/jobs.json"
          JOB_TOTALS_PATH="$RUNNER_TEMP/job-totals.json"
          export JOBS_JSON_PATH JOB_TOTALS_PATH
          node .github/scripts/collect-github-actions-jobs.mjs

          JOBS_JSON="$(cat "$JOBS_JSON_PATH")"
          PASSED="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).success)" "$JOB_TOTALS_PATH")"
          FAILED="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).failed)" "$JOB_TOTALS_PATH")"
          RUNNING="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).running)" "$JOB_TOTALS_PATH")"
          CANCELLED="$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8')).cancelled)" "$JOB_TOTALS_PATH")"

          STATUS="$(node -e "const needs = JSON.parse(process.env.CI_NEEDS_JSON); const results = Object.values(needs).map((job) => job.result); if (results.includes('failure')) console.log('failed'); else if (results.includes('cancelled') || results.includes('skipped')) console.log('cancelled'); else console.log('success');")"

          pnpm notify:telegram \
            --event ci \
            --status "$STATUS" \
            --mode text \
            --project "${{ github.event.repository.name }}" \
            --environment ci \
            --branch "${{ github.ref_name }}" \
            --repository "${{ github.repository }}" \
            --commit "${{ github.sha }}" \
            --message "$CI_COMMIT_MESSAGE" \
            --author "${{ github.actor }}" \
            --workflow "${{ github.workflow }}" \
            --job "Packages, API, Web, Admin" \
            --jobs-json "$JOBS_JSON" \
            --passed "$PASSED" \
            --failed "$FAILED" \
            --running "$RUNNING" \
            --cancelled "$CANCELLED" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
