services:
  db:
    image: postgres:16-alpine
    container_name: booking-db
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booking_base}
      POSTGRES_USER: ${POSTGRES_USER:-booking_base_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking_base_password}
    ports:
      - "${PROD_DB_PORT:-5432}:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booking-redis
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    command: redis-server --requirepass ${REDIS_PASSWORD:-booking_base_redis_password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-booking_base_redis_password}
    ports:
      - "${REDIS_DB_PORT:-6379}:6379"
    volumes:
      - booking_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$${REDIS_PASSWORD:-booking_base_redis_password}" ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: booking-minio
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - booking_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: booking-minio-init
    env_file:
      - path: .env.production
        required: false
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set minio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done &&
        mc mb --ignore-existing "minio/$${MINIO_BUCKET_PUBLIC}" &&
        mc mb --ignore-existing "minio/$${MINIO_BUCKET_PRIVATE}" &&
        mc mb --ignore-existing "minio/$${MINIO_BUCKET_TEMP}" &&
        mc anonymous set download "minio/$${MINIO_BUCKET_PUBLIC}"
    depends_on:
      minio:
        condition: service_started

  api:
    image: ${API_IMAGE:-booking-api}:${IMAGE_TAG:-latest}
    container_name: booking-api
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_ROLE: api
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      DATABASE_URL: postgresql://${DB_USER:-booking_base_user}:${DB_PASSWORD:-booking_base_password}@db:5432/${DB_NAME:-booking_base}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD:-booking_base_redis_password}@redis:6379
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - booking_storage:/app/storage
      - booking_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3000/health/live'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    image: ${API_IMAGE:-booking-api}:${IMAGE_TAG:-latest}
    container_name: booking-worker
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    command: ["node", "dist/workers/email/worker.main.js"]
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      APP_ROLE: worker
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      DATABASE_URL: postgresql://${DB_USER:-booking_base_user}:${DB_PASSWORD:-booking_base_password}@db:5432/${DB_NAME:-booking_base}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD:-booking_base_redis_password}@redis:6379
    volumes:
      - booking_storage:/app/storage
      - booking_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  web:
    image: ${WEB_IMAGE:-booking-web}:${IMAGE_TAG:-latest}
    container_name: booking-web
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy

  admin:
    image: ${ADMIN_IMAGE:-booking-admin}:${IMAGE_TAG:-latest}
    container_name: booking-admin
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    ports:
      - "${ADMIN_PORT:-3002}:3002"
    depends_on:
      api:
        condition: service_healthy

volumes:
  booking_postgres_data:
  booking_redis_data:
  booking_minio_data:
  booking_storage:
  booking_logs:
