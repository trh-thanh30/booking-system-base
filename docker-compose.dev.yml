services:
  db:
    image: postgres:16-alpine
    container_name: booking-db
    env_file:
      - path: .env.development
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booking_base}
      POSTGRES_USER: ${POSTGRES_USER:-booking_base_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking_base_password}
    ports:
      - "${DEV_DB_PORT:-5432}:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booking-redis
    env_file:
      - path: .env.development
        required: false
    command: redis-server --requirepass ${REDIS_PASSWORD:-booking_base_redis_password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-booking_base_redis_password}
    ports:
      - "${REDIS_DB_PORT:-6379}:6379"
    volumes:
      - booking_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD:-booking_base_redis_password}\" ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: booking-api
    env_file:
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://${DB_USER:-booking_base_user}:${DB_PASSWORD:-booking_base_password}@db:5432/${DB_NAME:-booking_base}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD:-booking_base_redis_password}@redis:6379
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - .:/app
      - booking_node_modules:/app/node_modules
      - booking_api_node_modules:/app/apps/api/node_modules
      - booking_shared_node_modules:/app/packages/shared/node_modules
      - ./storage:/app/storage
    command: sh -lc "pnpm install --frozen-lockfile && pnpm --filter @repo/api start:dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/health/live', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  booking_postgres_data:
  booking_redis_data:
  booking_node_modules:
  booking_api_node_modules:
  booking_shared_node_modules:
