services:
  db:
    image: postgres:16-alpine
    container_name: booking-db
    env_file:
      - path: .env.development
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-booking_base}
      POSTGRES_USER: ${POSTGRES_USER:-booking_base_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking_base_password}
    ports:
      - "${DEV_DB_PORT:-5432}:5432"
    volumes:
      - booking_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: booking-redis
    env_file:
      - path: .env.development
        required: false
    command: redis-server --requirepass ${REDIS_PASSWORD:-booking_base_redis_password}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-booking_base_redis_password}
    ports:
      - "${REDIS_DB_PORT:-6379}:6379"
    volumes:
      - booking_redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$${REDIS_PASSWORD:-booking_base_redis_password}" ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: booking-minio
    env_file:
      - path: .env.development
        required: false
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - booking_minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: booking-minio-init
    env_file:
      - path: .env.development
        required: false
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set minio http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done &&
        mc mb --ignore-existing "minio/$${MINIO_BUCKET_PUBLIC}" &&
        mc mb --ignore-existing "minio/$${MINIO_BUCKET_PRIVATE}" &&
        mc mb --ignore-existing "minio/$${MINIO_BUCKET_TEMP}" &&
        mc anonymous set download "minio/$${MINIO_BUCKET_PUBLIC}"
    depends_on:
      minio:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: booking-api
    env_file:
      - path: .env.development
        required: false
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      DATABASE_URL: postgresql://${DB_USER:-booking_base_user}:${DB_PASSWORD:-booking_base_password}@db:5432/${DB_NAME:-booking_base}?schema=${DB_SCHEMA:-public}
      REDIS_URL: redis://:${REDIS_PASSWORD:-booking_base_redis_password}@redis:6379
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - .:/app
      - booking_node_modules:/app/node_modules
      - booking_api_node_modules:/app/apps/api/node_modules
      - booking_shared_node_modules:/app/packages/shared/node_modules
      - ./storage:/app/storage
    command: sh -lc "pnpm install --frozen-lockfile && pnpm --filter @repo/api start:dev"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:3000/health/live'', r => process.exit(r.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  booking_postgres_data:
  booking_redis_data:
  booking_minio_data:
  booking_node_modules:
  booking_api_node_modules:
  booking_shared_node_modules:
